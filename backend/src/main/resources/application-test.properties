# ===== PERFIL DE TESTE LOCAL =====
spring.application.name=Meninas

# Banco de Dados de Teste (PostgreSQL via Docker)
spring.datasource.url=jdbc:postgresql://localhost:5433/meninas
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=123

# Hibernate — mantém o schema entre subidas
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# JWT (mesmas chaves do ambiente principal)
jwt.private.key=classpath:chave_privada.pem
jwt.public.key=classpath:chave_publica.pem

server.error.include-message=always

# Bootstrap do admin de teste
admin.username=ADMIN
admin.password=meninasOya@2026
