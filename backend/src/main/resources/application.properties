# Configuracoes do Projeto
spring.application.name=Meninas
server.port=8080

# Incluir mensagem nos erros HTTP (necessario para exibir motivo de login negado)
server.error.include-message=always

# Configuracao do Banco de Dados (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/meninas
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=123

# Configuracao do Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configuracao de Seguranca (JWT)
jwt.private.key=classpath:chave_privada.pem
jwt.public.key=classpath:chave_publica.pem

# Bootstrap do admin
admin.username=ADMIN
admin.password=senha-local-dev
